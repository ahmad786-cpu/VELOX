<!DOCTYPE html>

<style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .inner-glow-primary {
            box-shadow: inset 0 0 10px rgba(192, 193, 255, 0.2), 0 0 20px rgba(192, 193, 255, 0.4);
        }
        .progress-glow {
            box-shadow: 0 0 12px 2px rgba(76, 215, 246, 0.6);
        }
        .gesture-gradient-left {
            background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
        }
        .gesture-gradient-right {
            background: linear-gradient(to left, rgba(0,0,0,0.4), transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-surface font-body-md overflow-hidden antialiased">
<!-- Video Canvas -->
<div class="relative h-screen w-screen flex items-center justify-center bg-black">
<div class="absolute inset-0 z-0">
<img alt="Cinematic abstract 3D render with flowing indigo and cyan ribbons in a dark void" class="w-full h-full object-cover" data-alt="Cinematic abstract 3D digital art featuring flowing electric indigo and cyan waves in a deep black infinite space with soft atmospheric glow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATemALrG4U26ORm8gaXv79MU5n-Bpa3yvH1bM2qsLYyA_z37bhJnLk4AKLqOICch2ug5JDLUNzxIVIJPETg2--RuHvSejGAWZYapzPNS7y_F6lqsACPsZBQT8u18ZlWLm65YjXGR-sNSVXuA8IlWzDoT90mW-ZgG9C7JsCyZRRBHAIxyXpZeBzZf-H9Ao5miC-sYgVGD3Af0x-1VzPXpwVX69VHnFBYkPM4wBKqZiS6d1cszrRiYHeNkHwokzZalyd1cUgh9q-JAs"/>
</div>
<!-- Gesture Zones -->
<div class="absolute inset-y-0 left-0 w-1/4 z-10 flex items-center justify-center gesture-gradient-left opacity-0 hover:opacity-100 transition-opacity duration-500">
<div class="flex flex-col items-center gap-4 py-8 px-4 rounded-full glass-panel">
<span class="material-symbols-outlined text-secondary scale-125" data-icon="light_mode">light_mode</span>
<div class="h-48 w-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-1/2 w-full bg-secondary progress-glow"></div>
</div>
</div>
</div>
<div class="absolute inset-y-0 right-0 w-1/4 z-10 flex items-center justify-center gesture-gradient-right opacity-0 hover:opacity-100 transition-opacity duration-500">
<div class="flex flex-col items-center gap-4 py-8 px-4 rounded-full glass-panel">
<span class="material-symbols-outlined text-primary scale-125" data-icon="volume_up">volume_up</span>
<div class="h-48 w-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-3/4 w-full bg-primary inner-glow-primary"></div>
</div>
</div>
</div>
<!-- Top Controls Shell (Custom TopAppBar) -->
<div class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-slate-950/50 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-4">
<button class="p-2 text-white hover:text-cyan-400 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="text-white font-headline-md tracking-tight">The Quantum Archive: Episode 04</span>
<span class="text-slate-400 text-label-sm uppercase tracking-widest">4K • HDR • 5.1 AUDIO</span>
</div>
</div>
<div class="flex items-center gap-6">
<button class="p-2 text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="cast">cast</span>
</button>
<button class="p-2 text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="picture_in_picture_alt">picture_in_picture_alt</span>
</button>
<button class="p-2 text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
<div class="w-10 h-10 rounded-full border border-white/20 overflow-hidden">
<img alt="User Profile Avatar" class="w-full h-full object-cover" data-alt="Close up portrait of a professional man with clean lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApYr4Hq1ac_TTyVj2KcgdsE9P1OfuFGb-oTM8ouT0_ybBXZaUN4MTMIOg-3vqxPFI8hV77e6TG4870ZvpjBjfA8N-LBiQwJZxmDlF35CdjwyQd87W6zjlUCkciB6zVx4i1bo3_WOh1Qguj3ieKRVD4lYtCMfj4SAu9nZgKhPIsIKie4K0wMRWmSQ_-sl3VCgdenrCES9Vdr-IT6AWRwQie00ldeyidktk0MpnygOTYnuoDHU-twp8T7n5--VK0La15WWWNMucuq2A"/>
</div>
</div>
</div>
<!-- Bottom Controls Shell -->
<div class="fixed bottom-0 left-0 w-full z-50 p-8 flex flex-col gap-6">
<!-- Progress Area -->
<div class="group relative w-full h-1.5 bg-white/10 rounded-full cursor-pointer hover:h-2 transition-all duration-300">
<div class="absolute left-0 top-0 h-full w-[64%] bg-gradient-to-r from-primary to-secondary rounded-full relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full scale-0 group-hover:scale-100 transition-transform duration-200 shadow-[0_0_15px_rgba(255,255,255,0.8)]"></div>
</div>
<!-- Time Indicators -->
<div class="flex justify-between mt-4 text-label-sm text-slate-400 font-medium">
<span>24:42</span>
<span>38:15</span>
</div>
</div>
<!-- Interaction Bar -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-8">
<button class="text-slate-400 hover:text-white transition-colors group">
<span class="material-symbols-outlined scale-110" data-icon="closed_caption">closed_caption</span>
</button>
<button class="text-slate-400 hover:text-white transition-colors group">
<span class="material-symbols-outlined scale-110" data-icon="speed">speed</span>
<span class="text-label-sm ml-1">1.25x</span>
</button>
</div>
<!-- Primary Playback Cluster -->
<div class="flex items-center gap-10">
<button class="text-white hover:text-secondary transition-all active:scale-90">
<span class="material-symbols-outlined text-[32px]" data-icon="replay_10">replay_10</span>
</button>
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-gradient-to-br from-primary to-secondary text-on-primary-container shadow-lg inner-glow-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[48px]" data-icon="pause" data-weight="fill">pause</span>
</button>
<button class="text-white hover:text-secondary transition-all active:scale-90">
<span class="material-symbols-outlined text-[32px]" data-icon="forward_10">forward_10</span>
</button>
</div>
<div class="flex items-center gap-8">
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined scale-110" data-icon="playlist_play">playlist_play</span>
</button>
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined scale-110" data-icon="fullscreen">fullscreen</span>
</button>
</div>
</div>
</div>
<!-- Central Playback Hint (Floating briefly on interaction) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
<div class="glass-panel w-24 h-24 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl" data-icon="play_arrow">play_arrow</span>
</div>
</div>
</div>
<!-- Hidden Bottom Nav for top-level context (Per requirements, suppressed on Task-Focused screen) -->
<!-- BottomNavBar would be here but is suppressed as per Shell Visibility Rules -->
</body></html>
